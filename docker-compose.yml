version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: legendaryclass_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: legendaryclass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: legendaryclass_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@legendaryclass.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
